<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Produtos</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    align-items: center;
    justify-content: center;
}

.card {
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,.3);
}

.card-header {
    background: linear-gradient(135deg, #0d6efd, #084298);
    color: white;
    text-align: center;
}

pre {
    background: #f8f9fa;
    padding: 15px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card">
                <div class="card-header">
                    <h4>Cadastro de Produtos</h4>
                </div>

                <div class="card-body">
                    <form id="produtoForm">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Tipo</label>
                                <select class="form-select" id="tipo" required>
                                    <option value="">Selecione</option>
                                    <option>Camisa</option>
                                    <option>Blusa</option>
                                    <option>Suéter</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Tamanho</label>
                                <select class="form-select" id="tamanho" required>
                                    <option value="">Selecione</option>
                                    <option>PP</option>
                                    <option>P</option>
                                    <option>M</option>
                                    <option>G</option>
                                    <option>GG</option>
                                </select>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Quantidade</label>
                                <input type="number" id="quantidade" class="form-control" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Valor</label>
                                <input type="number" step="0.01" id="valor" class="form-control" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Marca</label>
                                <input type="text" id="marca" class="form-control" required>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button class="btn btn-success btn-lg">
                                Enviar
                            </button>
                        </div>

                    </form>
                </div>
            </div>

            <div class="card mt-4">
                <div class="card-header">
                    <h5>Resposta da API</h5>
                </div>
                <div class="card-body">
                    <pre id="resultado">Aguardando envio...</pre>
                </div>
            </div>

        </div>
    </div>
</div>

<script>


document.getElementById("produtoForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const produto = {
        tipo: document.getElementById("tipo").value,
        tamanho: document.getElementById("tamanho").value,
        quantidade: parseInt(document.getElementById("quantidade").value),
        preco: parseFloat(document.getElementById("valor").value),
        marca: document.getElementById("marca").value
    };

    fetch("http://localhost:8080/roupas", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(produto)
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("resultado").textContent =
            JSON.stringify(data, null, 4);
    })
    .catch(err => {
        document.getElementById("resultado").textContent = err;
    });
});
</script>

</body>
</html>
